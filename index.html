<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YV English · Cristiane</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="hero">
  <div class="hero-top">
    <!-- ✏️ TROQUE A LOGO AQUI -->
    <img src="logo-yv.png" alt="YV English" class="logo-img">

    <div class="student-pill">
      <span class="student-icon">♡</span>
      Cristiane
    </div>
  </div>

  <div class="hero-content">
    <p class="eyebrow">Sua área pessoal</p>
    <h1>Hello, Cristiane ✨</h1>
    <p>
      Aqui você encontra seus materiais da semana:<br>
      PDFs, áudios e atividades para praticar antes da aula.
    </p>
    <span class="small-line"></span>
  </div>

  <div class="hero-watermark">YV</div>
  <div class="hero-curve"></div>
</header>

<main>
  <div class="section-title">
    <span></span>
    <p>Semanas</p>
    <span></span>
  </div>

  <section class="weeks-grid" id="weeksGrid"></section>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>

    <aside class="modal-side">
      <p id="modalWeekLabel"></p>
      <h2 id="modalTitle"></h2>
      <span class="small-line"></span>

      <div class="focus-box">
        <strong>Foco da semana</strong>
        <p id="modalFocus"></p>
      </div>

      <span class="heart">♡</span>
    </aside>

    <section class="modal-content" id="modalBody"></section>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
