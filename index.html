<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YV English · Cristiane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">YV <span>English</span></div>
</header>

<section class="hero">
  <p class="greeting">Sua área pessoal</p>
  <!-- ✏️ TROQUE O NOME AQUI -->
  <h1>Hello, Cristiane ✨</h1>
  <p class="subtitle">Aqui estão os materiais das suas aulas. Clique na semana para ver seus exercícios, áudios e links.</p>
</section>

<div class="divider"><span class="divider-label">Semanas</span></div>

<div class="weeks-grid" id="weeksGrid">
  <!-- As semanas são geradas pelo JS abaixo. Edite o array WEEKS. -->
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <p class="modal-week-label" id="modalWeekLabel"></p>
      <h2 class="modal-title" id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
